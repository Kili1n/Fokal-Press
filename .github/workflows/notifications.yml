name: Daily Push Notifications

on:
  schedule:
    - cron: '0 8 * * *' # S'exécute tous les jours à 08:00 UTC (soit 9h ou 10h en France selon l'heure d'été/hiver)
  workflow_dispatch: # Permet de lancer le script manuellement depuis GitHub pour tester

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci # Installe firebase-admin et web-push depuis package-lock.json

      - name: Run Notifications Script
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: node .github/scripts/send-notifs.js